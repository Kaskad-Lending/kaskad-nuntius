[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 1

# NitroProver remappings (Marlin attestation verification)
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "nitro-prover/=lib/nitro-prover/src/",
    "marlinprotocol/solidity-cbor/=lib/nitro-prover/lib/solidity-cbor/packages/solidity-cbor/contracts/",
    "marlinprotocol/P384/=lib/nitro-prover/lib/P384/contracts/",
    "marlinprotocol/SolSha2Ext/=lib/nitro-prover/lib/SolSha2Ext/contracts/lib/",
    "@ensdomains/buffer/=lib/nitro-prover/lib/buffer/",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
