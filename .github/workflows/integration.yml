name: Integration

on:
  # Manual-only. The full-flow script currently needs a dev `Deploy.s.sol`
  # helper in the contracts submodule that hasn't been rewritten after
  # the round-1 audit removed mock-based deploys. Until that's back,
  # push/PR triggers just redflag every push. Operator runs manually when
  # the integration harness is rebuilt.
  workflow_dispatch:

jobs:
  integration:
    name: Full Flow (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build oracle binary
        run: cargo build --release

      - name: Run full flow test
        run: bash scripts/full_flow_test.sh
        timeout-minutes: 5
