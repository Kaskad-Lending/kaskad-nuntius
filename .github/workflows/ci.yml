name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FOUNDRY_PROFILE: ci

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ─── Rust ──────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy -- -D warnings || true  # warn-only for now

      - name: Rust tests
        run: cargo test

      # ─── Solidity ──────────────────────────────────
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge build
        working-directory: contracts
        run: forge build --sizes

      - name: Forge tests
        working-directory: contracts
        run: forge test -vvv

      - name: Forge format check
        working-directory: contracts
        run: forge fmt --check || true  # warn-only for now
